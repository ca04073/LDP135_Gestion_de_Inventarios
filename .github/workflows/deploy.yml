name: 🚀 CI/CD Pipeline - Gestión de Inventario

# 1. Disparadores: Cuándo se ejecuta el pipeline
on:
  push:
    branches: [ "main", "CA04073/docker-deployment" ] # Se activa al subir cambios a main o a tu rama de pruebas de infra
  pull_request:
    branches: [ "main" ]

# 2. Permisos del GITHUB_TOKEN (Crucial para poder subir la imagen)
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Paso 1: Descargar el código del repositorio en el servidor virtual de GitHub
      - name: 📥 Checkout del código
        uses: actions/checkout@v4
        with:
          submodules: 'recursive' # Mantiene la sincronización si usas submódulos

      # Paso 2: Autenticarse en el GitHub Container Registry (ghcr.io)
      - name: 🔑 Iniciar sesión en GitHub Packages
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Paso 3: Extraer metadatos (etiquetas, versiones) para Docker de forma automática
      - name: 🏷️ Extraer metadatos para Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/ca04073/ldp135-gestion-inventarios
          tags: |
            type=raw,value=latest
            type=sha,value={{sha}}

      # Paso 4: Construir la imagen de Docker y subirla al Registry (GHCR)
      - name: 🐳 Construir y subir Imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ id.meta.outputs.tags }}
          labels: ${{ id.meta.outputs.labels }}