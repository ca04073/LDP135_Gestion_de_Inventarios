name: 🚀 CI/CD Pipeline - Gestión de Inventario

# 1. Disparadores: Cuándo se ejecuta el pipeline
on:
  push:
    branches: [ "main", "CA04073/docker-deployment" ]
  pull_request:
    branches: [ "main" ]

# 2. Permisos del GITHUB_TOKEN
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Paso 1: Descargar el código del repositorio
      - name: 📥 Checkout del código
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      # Paso 2: Autenticarse en el GitHub Container Registry
      - name: 🔑 Iniciar sesión en GitHub Packages
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Paso 3: Extraer metadatos para Docker
      - name: 🏷️ Extraer metadatos para Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/ca04073/ldp135-gestion-inventarios
          tags: |
            type=raw,value=latest
            type=sha,value={{sha}}

      # Paso 4: Construir y subir Imagen Docker (Corregido con 'steps.')
      - name: 🐳 Construir y subir Imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}    # 👈 Corregido aquí
          labels: ${{ steps.meta.outputs.labels }}  # 👈 Corregido aquí